name: CI - vvvv gamma export smoke test (Windows)

on:
  workflow_dispatch:
    inputs:
      offline_url:
        description: 'Optional TeamCity offline installer URL override'
        required: false
        type: string
      patch_path:
        description: 'Optional patch path override relative to repo root'
        required: false
        type: string
  push:
    branches: [main]

jobs:
  export:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      VVVV_OFFLINE_URL_DEFAULT: https://teamcity.vvvv.org/guestAuth/app/rest/builds/id:39385/artifacts/content/vvvv_gamma_7.0-win-x64_setup_offline.exe
      VVVV_INSTALLER: ${{ github.workspace }}\vvvv_setup_offline.exe
      EXPORT_DIR: ${{ github.workspace }}\dist
      PATCH_PATH_DEFAULT: ${{ github.workspace }}\HelloGithub.vl

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve inputs
        id: resolve
        shell: pwsh
        run: |
          $offlineUrl = '${{ inputs.offline_url }}'
          if ([string]::IsNullOrWhiteSpace($offlineUrl)) {
            $offlineUrl = $env:VVVV_OFFLINE_URL_DEFAULT
          }

          $patchInput = '${{ inputs.patch_path }}'
          if ([string]::IsNullOrWhiteSpace($patchInput)) {
            $patchPath = $env:PATCH_PATH_DEFAULT
          }
          else {
            $patchPath = Join-Path $env:GITHUB_WORKSPACE $patchInput
          }

          if (-not (Test-Path $patchPath)) {
            throw "Patch path does not exist: $patchPath"
          }

          "offline_url=$offlineUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "patch_path=$patchPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Download offline installer
        id: download
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $duration = (Measure-Command {
            Invoke-WebRequest -Uri '${{ steps.resolve.outputs.offline_url }}' -OutFile $env:VVVV_INSTALLER
          }).TotalSeconds
          Get-Item $env:VVVV_INSTALLER | Format-List FullName,Length,LastWriteTime
          "seconds=$([math]::Round($duration, 2))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Install vvvv gamma silently
        id: install
        shell: pwsh
        run: |
          $duration = (Measure-Command {
            $script:p = Start-Process -FilePath $env:VVVV_INSTALLER -ArgumentList '/SP- /VERYSILENT /SUPPRESSMSGBOXES /NORESTART' -Wait -PassThru
          }).TotalSeconds
          $p = $script:p
          if ($p.ExitCode -ne 0) {
            throw "Installer failed with exit code $($p.ExitCode)"
          }
          Write-Host "Installer exit code: $($p.ExitCode)"
          "seconds=$([math]::Round($duration, 2))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Locate vvvvc.exe
        id: locate
        shell: pwsh
        run: |
          $candidates = @(
            'C:\Program Files\vvvv\vvvv_gamma_7.0-win-x64\vvvvc.exe',
            'C:\Program Files\vvvv\vvvv gamma\vvvvc.exe',
            'C:\Program Files\vvvv\vvvv\vvvvc.exe',
            'C:\Program Files\vvvv gamma\vvvvc.exe',
            'C:\Program Files (x86)\vvvv\vvvv gamma\vvvvc.exe',
            'C:\Program Files (x86)\vvvv\vvvv\vvvvc.exe',
            'C:\Program Files (x86)\vvvv gamma\vvvvc.exe'
          )

          if (Test-Path 'C:\Program Files\vvvv') {
            $candidates += Get-ChildItem 'C:\Program Files\vvvv' -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -like 'vvvv_gamma_*' } |
              ForEach-Object { Join-Path $_.FullName 'vvvvc.exe' }
          }

          $found = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $found) {
            $searchRoots = @(
              'C:\Program Files',
              'C:\Program Files (x86)',
              "$env:LOCALAPPDATA\Programs"
            ) | Where-Object { Test-Path $_ }

            foreach ($root in $searchRoots) {
              $found = Get-ChildItem $root -Filter vvvvc.exe -File -Recurse -ErrorAction SilentlyContinue |
                Select-Object -ExpandProperty FullName -First 1
              if ($found) { break }
            }
          }

          if (-not $found) {
            Write-Host 'Top-level Program Files listing:'
            Get-ChildItem 'C:\Program Files' | Select-Object FullName
            if (Test-Path 'C:\Program Files (x86)') {
              Write-Host 'Top-level Program Files (x86) listing:'
              Get-ChildItem 'C:\Program Files (x86)' | Select-Object FullName
            }

            Write-Host 'Folders matching *vvvv* under common roots:'
            foreach ($root in @('C:\Program Files', 'C:\Program Files (x86)', "$env:LOCALAPPDATA\Programs")) {
              if (Test-Path $root) {
                Get-ChildItem $root -Directory -Recurse -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -match 'vvvv' } |
                  Select-Object -First 20 -ExpandProperty FullName
              }
            }
            throw 'vvvvc.exe not found after install'
          }

          Write-Host "Found vvvvc.exe at: $found"
          Write-Host 'Install root listing:'
          Get-ChildItem (Split-Path -Parent $found) | Select-Object Name,Length,Mode
          "vvvvc=$found" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Export minimal app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:EXPORT_DIR | Out-Null

          $vvvvc = '${{ steps.locate.outputs.vvvvc }}'
          $patch = '${{ steps.resolve.outputs.patch_path }}'

          $common = @(
            '--verbosity', 'Information',
            '--output-directory', $env:EXPORT_DIR,
            '--output-type', 'WinExe',
            '--rid', 'win-x64',
            '--clean', 'true'
          )

          & $vvvvc @common $patch
          if ($LASTEXITCODE -ne 0) {
            Write-Host 'First attempt failed; retrying with patch path first to validate CLI argument order.'
            & $vvvvc $patch @common
          }

          if ($LASTEXITCODE -ne 0) {
            throw "vvvvc export failed with exit code $LASTEXITCODE"
          }

      - name: Show export directory
        shell: pwsh
        run: |
          Get-ChildItem $env:EXPORT_DIR -Recurse | Select-Object FullName,Length

      - name: Upload export artifact
        uses: actions/upload-artifact@v6
        with:
          name: vvvv-export
          path: |
            dist/**
            !dist/src/**

      - name: Timing summary
        shell: pwsh
        run: |
          @"
          ### vvvv CI timing
          - Download installer: ${{ steps.download.outputs.seconds }}s
          - Silent install: ${{ steps.install.outputs.seconds }}s
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
